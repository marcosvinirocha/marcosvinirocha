<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Marcos Vinicius</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1200px;
            height: 300px;
            background: linear-gradient(135deg, #282a36 0%, #44475a 50%, #282a36 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 60px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        .left {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .name {
            font-size: 42px;
            font-weight: 700;
            color: #f8f8f2;
            letter-spacing: -0.5px;
        }
        
        .title {
            font-size: 20px;
            color: #bd93f9;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .techs {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .tech-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #f8f8f2;
            font-weight: 500;
        }
        
        .tech-badge svg {
            width: 18px;
            height: 18px;
        }
        
        .right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        
        .location {
            font-size: 14px;
            color: #6272a4;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tagline {
            font-size: 14px;
            color: #8be9fd;
            font-style: italic;
        }
        
        .accent-line {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #bd93f9, #ff79c6);
            border-radius: 2px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="left">
        <div class="name">Marcos Vinicius</div>
        <div class="title">
            <span>Full Stack Developer</span>
            <span>•</span>
            <span>Software Engineer</span>
        </div>
        <div class="techs">
            <div class="tech-badge">
                <svg viewBox="0 0 24 24" fill="#61DAFB"><path d="M12 13.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/><path fill="#61DAFB" d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2Zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8Z"/><path fill="#61DAFB" d="M12 6.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11Zm0 9a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z"/><path fill="#61DAFB" d="M17.5 5.5a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM6.5 5.5a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM17.5 14.5a2 2 0 1 1 0 4 2 2 0 0 1 0-4ZM6.5 14.5a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/></svg>
                React
            </div>
            <div class="tech-badge">
                <svg viewBox="0 0 24 24" fill="#4FC08D"><path d="M2.375 3.375C1.753 3.375 1.25 3.878 1.25 4.5v15c0 .622.503 1.125 1.125 1.125h20.25c.622 0 1.125-.503 1.125-1.125v-15c0-.622-.503-1.125-1.125-1.125H2.375Zm3.12 4.5a.75.75 0 0 1 .75-.75h1.26a.75.75 0 0 1 0 1.5H6.245a.75.75 0 0 1-.75-.75Zm0 3.6a.75.75 0 0 1 .75-.75h12.66a.75.75 0 0 1 0 1.5H5.495a.75.75 0 0 1-.75-.75Zm0 3.6a.75.75 0 0 1 .75-.75h12.66a.75.75 0 0 1 0 1.5H5.495a.75.75 0 0 1-.75-.75Z"/></svg>
                Vue
            </div>
            <div class="tech-badge">
                <svg viewBox="0 0 24 24" fill="#E76F00"><path d="M12.75 2.25c-1.036 0-1.875.84-1.875 1.875v17.25c0 1.035.84 1.875 1.875 1.875h6c1.035 0 1.875-.84 1.875-1.875V11.25a6.75 6.75 0 0 0-6.75-6.75h-.75ZM9.75 6.75c0-.966.784-1.75 1.75-1.75h1.5c.966 0 1.75.784 1.75 1.75v6.75c0 .966-.784 1.75-1.75 1.75h-1.5c-.966 0-1.75-.784-1.75-1.75V6.75ZM6 10.5c0-.966.784-1.75 1.75-1.75h1.5c.966 0 1.75.784 1.75 1.75v1.5c0 .966-.784 1.75-1.75 1.75H7.75A1.75 1.75 0 0 1 6 12V10.5Z"/></svg>
                Java
            </div>
        </div>
        <div class="accent-line"></div>
    </div>
    <div class="right">
        <div class="location">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#6272a4"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7Zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5Z"/></svg>
            Uberlândia, MG
        </div>
        <div class="tagline">Spec-Driven Development</div>
    </div>
</body>
</html>
